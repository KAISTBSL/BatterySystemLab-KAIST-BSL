<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>일정 관리 · BSL Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080e1a;--surface:#0d1b2e;--surface2:#112240;--surface3:#162a4a;
  --border:rgba(102,204,255,0.12);--border2:rgba(102,204,255,0.25);
  --accent:#007acc;--accent2:#66ccff;
  --text:#dde2ef;--text2:#7a90b0;--text3:#3a5070;
  --success:#3ecf8e;--warn:#f4a832;--danger:#f45c5c;
  --mono:'JetBrains Mono',monospace;--sans:'Pretendard',-apple-system,sans-serif;
  --r:8px;--r2:14px;
}
html{scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(102,204,255,0.018) 1px,transparent 1px),
  linear-gradient(90deg,rgba(102,204,255,0.018) 1px,transparent 1px);background-size:52px 52px}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 35% at 50% -5%,rgba(244,168,50,0.05) 0%,transparent 60%)}

header{position:sticky;top:0;z-index:200;background:rgba(8,14,26,0.92);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);height:64px;display:flex;align-items:center;
  justify-content:space-between;padding:0 2rem}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-badge{background:linear-gradient(135deg,#f4a832,#f4e032);color:#080e1a;
  font-family:var(--mono);font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:1px}
.logo-title{font-size:14px;font-weight:600;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text3);font-family:var(--mono)}
.header-right{display:flex;align-items:center;gap:8px}
.user-badge{display:flex;align-items:center;gap:7px;background:rgba(62,207,142,0.1);
  border:1px solid rgba(62,207,142,0.25);padding:5px 13px;border-radius:30px}
.user-badge-dot{width:7px;height:7px;border-radius:50%;background:var(--success);flex-shrink:0;
  box-shadow:0 0 6px rgba(62,207,142,0.6)}
.user-badge-name{font-family:var(--mono);font-size:12px;color:var(--success);letter-spacing:.5px}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1px solid var(--border2);
  color:var(--text2);padding:6px 14px;border-radius:7px;font-size:13px;font-family:var(--sans);
  cursor:pointer;text-decoration:none;transition:all .18s}
.back-btn:hover{border-color:var(--accent2);color:var(--accent2);background:rgba(102,204,255,0.06)}

/* DB 상태 토스트 */
.toast{position:fixed;bottom:24px;right:24px;z-index:9999;
  background:var(--surface2);border:1px solid var(--border2);border-radius:10px;
  padding:10px 18px;font-size:13px;color:var(--text);
  display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  opacity:0;transform:translateY(10px);transition:all .25s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok  i{color:var(--success)}
.toast.err i{color:var(--danger)}
.toast.loading i{color:var(--warn)}

/* 로딩 오버레이 */
.loading-overlay{position:fixed;inset:0;z-index:500;background:rgba(8,14,26,0.7);
  backdrop-filter:blur(4px);display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;opacity:0;pointer-events:none;transition:opacity .2s}
.loading-overlay.show{opacity:1;pointer-events:all}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent2);
  border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--mono);font-size:12px;color:var(--text2);letter-spacing:1px}

.main-layout{position:relative;z-index:1;display:grid;grid-template-columns:1fr 320px;
  gap:20px;max-width:1200px;margin:0 auto;padding:2rem 2rem 5rem}
@media(max-width:900px){.main-layout{grid-template-columns:1fr}}

.cal-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.cal-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.cal-nav{display:flex;align-items:center;gap:8px;margin-right:auto}
.cal-nav button{background:none;border:1px solid var(--border2);color:var(--text2);width:32px;height:32px;
  border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .18s}
.cal-nav button:hover{border-color:var(--accent2);color:var(--accent2)}
.cal-month{font-size:16px;font-weight:600;color:var(--text);min-width:120px;text-align:center}
.cal-today-btn{background:none;border:1px solid var(--border2);color:var(--text2);padding:5px 12px;
  border-radius:8px;font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .18s}
.cal-today-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.add-event-btn{background:linear-gradient(135deg,#c17e2e,#f4a832);border:none;color:#080e1a;
  padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;font-family:var(--sans);
  cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .18s}
.add-event-btn:hover{opacity:.85;transform:translateY(-1px)}

.cal-grid-header{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid var(--border)}
.cal-dow{padding:8px;text-align:center;font-size:11px;font-family:var(--mono);color:var(--text3);letter-spacing:.5px;text-transform:uppercase}
.cal-dow:first-child{color:#f45c5c}
.cal-dow:last-child{color:#3b82f6}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
.cal-cell{min-height:90px;border-right:1px solid var(--border);border-bottom:1px solid var(--border);
  padding:6px;cursor:pointer;transition:background .15s;position:relative}
.cal-cell:nth-child(7n){border-right:none}
.cal-cell:hover{background:var(--surface2)}
.cal-cell.other-month{opacity:.4}
.cal-cell.today .day-num{background:var(--accent2);color:#080e1a;border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;font-weight:700}
.cal-cell.sunday .day-num{color:#f45c5c}
.cal-cell.saturday .day-num{color:#3b82f6}
.day-num{font-size:12px;font-family:var(--mono);color:var(--text2);margin-bottom:4px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center}
.event-dot{font-size:11px;font-weight:500;padding:2px 5px;border-radius:4px;margin-bottom:2px;
  cursor:pointer;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:opacity .15s}
.event-dot:hover{opacity:.75}
.more-events{font-size:10px;font-family:var(--mono);color:var(--text3);padding:1px 4px}
.type-meeting{background:rgba(59,130,246,0.2);color:#93c5fd}
.type-deadline{background:rgba(244,92,92,0.2);color:#fca5a5}
.type-present{background:rgba(167,139,250,0.2);color:#c4b5fd}
.type-lab{background:rgba(62,207,142,0.2);color:#6ee7b7}
.type-other{background:rgba(244,168,50,0.2);color:#fcd34d}

.sidebar{display:flex;flex-direction:column;gap:16px}
.side-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.side-header{padding:13px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:500;
  color:var(--text2);display:flex;align-items:center;gap:8px;letter-spacing:.3px}
.side-body{padding:14px 16px}
.legend-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text2)}
.legend-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.upcoming-list{display:flex;flex-direction:column;gap:8px}
.upcoming-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 12px;display:flex;gap:10px;align-items:flex-start;cursor:pointer;transition:border-color .18s}
.upcoming-item:hover{border-color:var(--border2)}
.upcoming-stripe{width:3px;border-radius:3px;flex-shrink:0;align-self:stretch}
.upcoming-content{flex:1;min-width:0}
.upcoming-title{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.upcoming-meta{font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:2px}
.upcoming-author{font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:3px}
.upcoming-type{font-size:10px;font-family:var(--mono);padding:1px 6px;border-radius:3px;display:inline-block;margin-top:3px}
.no-events{font-size:13px;color:var(--text3);text-align:center;padding:16px 0}

.modal-bg{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.72);
  backdrop-filter:blur(6px);align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r2);
  padding:26px;width:440px;max-width:90vw;position:relative;animation:fadeUp .25s ease;max-height:90vh;overflow-y:auto}
.modal-close{position:absolute;top:12px;right:16px;background:none;border:none;
  color:rgba(255,255,255,0.35);font-size:1.3em;cursor:pointer;transition:color .15s}
.modal-close:hover{color:white}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;color:var(--text)}
.modal-author-info{display:flex;align-items:center;gap:8px;background:rgba(62,207,142,0.07);
  border:1px solid rgba(62,207,142,0.18);border-radius:var(--r);padding:7px 12px;margin-bottom:14px;
  font-size:12px;color:var(--text2)}
.modal-author-info i{color:var(--success)}
.modal-author-info strong{color:var(--success)}
.form-row{margin-bottom:14px}
.form-label{font-size:11px;font-family:var(--mono);color:var(--text2);letter-spacing:.5px;
  text-transform:uppercase;display:block;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--surface2);border:1px solid var(--border2);
  border-radius:var(--r);color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;
  outline:none;transition:border-color .18s;box-sizing:border-box}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:rgba(244,168,50,0.5);box-shadow:0 0 0 3px rgba(244,168,50,0.07)}
.form-select{cursor:pointer;appearance:none;-webkit-appearance:none}
.form-select option{background:var(--surface)}
.form-textarea{resize:vertical;min-height:70px}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.edit-author-row{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:10px}
.modal-actions{display:flex;gap:10px;margin-top:18px}
.btn-save{flex:1;padding:10px;background:linear-gradient(135deg,#c17e2e,#f4a832);border:none;
  border-radius:var(--r);color:#080e1a;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;transition:opacity .18s}
.btn-save:hover{opacity:.85}
.btn-cancel{padding:10px 16px;background:none;border:1px solid var(--border2);border-radius:var(--r);
  color:var(--text2);font-size:13px;font-family:var(--sans);cursor:pointer;transition:all .18s}
.btn-cancel:hover{border-color:#f45c5c;color:#f45c5c}
.btn-delete{padding:10px 14px;background:rgba(244,92,92,0.12);border:1px solid rgba(244,92,92,0.25);
  border-radius:var(--r);color:#f45c5c;font-size:13px;font-family:var(--sans);cursor:pointer;transition:all .18s}
.btn-delete:hover{background:rgba(244,92,92,0.2)}

footer{position:relative;z-index:1;background:rgba(8,14,26,0.95);border-top:1px solid var(--border);
  padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text3)}
footer a{color:var(--text2);text-decoration:none}
footer a:hover{color:var(--accent2)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Firestore 연결 중...</div>
</div>

<div class="toast" id="toast"><i class="fa fa-circle-check"></i><span id="toastMsg"></span></div>

<header>
  <a href="admin.html" class="logo">
    <div class="logo-badge">BSL</div>
    <div>
      <div class="logo-title">일정 관리</div>
      <div class="logo-sub">Calendar · Firestore</div>
    </div>
  </a>
  <div class="header-right">
    <div class="user-badge" id="userBadge" style="display:none">
      <div class="user-badge-dot"></div>
      <span class="user-badge-name" id="userBadgeName"></span>
    </div>
    <a href="admin.html" class="back-btn" id="backBtn"><i class="fa fa-arrow-left"></i> 대시보드</a>
  </div>
</header>

<div class="main-layout">
  <div class="cal-panel">
    <div class="cal-header">
      <div class="cal-nav">
        <button onclick="changeMonth(-1)">&#8249;</button>
        <div class="cal-month" id="calMonth"></div>
        <button onclick="changeMonth(1)">&#8250;</button>
      </div>
      <button class="cal-today-btn" onclick="goToday()">오늘</button>
      <button class="add-event-btn" onclick="openAddModal()">
        <i class="fa fa-plus"></i> 일정 추가
      </button>
    </div>
    <div class="cal-grid-header">
      <div class="cal-dow">일</div><div class="cal-dow">월</div><div class="cal-dow">화</div>
      <div class="cal-dow">수</div><div class="cal-dow">목</div><div class="cal-dow">금</div>
      <div class="cal-dow">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <div class="sidebar">
    <div class="side-panel">
      <div class="side-header"><i class="fa fa-palette" style="color:var(--accent2)"></i> 유형별 색상</div>
      <div class="side-body">
        <div class="legend-grid">
          <div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>미팅</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f45c5c"></div>마감</div>
          <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>발표</div>
          <div class="legend-item"><div class="legend-dot" style="background:#3ecf8e"></div>실험</div>
          <div class="legend-item"><div class="legend-dot" style="background:#f4a832"></div>기타</div>
        </div>
      </div>
    </div>
    <div class="side-panel" style="flex:1">
      <div class="side-header"><i class="fa fa-clock" style="color:#f4a832"></i> 다가오는 일정</div>
      <div class="side-body"><div class="upcoming-list" id="upcomingList"></div></div>
    </div>
    <div class="side-panel">
      <div class="side-header"><i class="fa fa-chart-bar" style="color:#a78bfa"></i> 이번달 요약</div>
      <div class="side-body" id="monthStats" style="font-size:12px;color:var(--text2);display:flex;flex-direction:column;gap:6px"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="eventModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h3 id="modalTitle">일정 추가</h3>
    <div class="modal-author-info" id="modalAuthorInfo">
      <i class="fa fa-user-circle"></i>
      <span><strong id="modalAuthorName"></strong>으로 등록됩니다</span>
    </div>
    <div class="form-row">
      <label class="form-label">제목 *</label>
      <input type="text" class="form-input" id="evTitle" placeholder="일정 제목">
    </div>
    <div class="form-row-2">
      <div><label class="form-label">날짜 *</label><input type="date" class="form-input" id="evDate"></div>
      <div><label class="form-label">시간</label><input type="time" class="form-input" id="evTime"></div>
    </div>
    <div class="form-row">
      <label class="form-label">유형 *</label>
      <select class="form-select" id="evType">
        <option value="meeting">📅 미팅</option>
        <option value="deadline">⏰ 마감</option>
        <option value="present">🎤 발표</option>
        <option value="lab">🔬 실험</option>
        <option value="other">📌 기타</option>
      </select>
    </div>
    <div class="form-row">
      <label class="form-label">메모</label>
      <textarea class="form-textarea" id="evNote" placeholder="추가 메모 (선택)"></textarea>
    </div>
    <div class="edit-author-row" id="editAuthorRow" style="display:none">
      <i class="fa fa-user"></i> 등록: <span id="editAuthorText"></span>
    </div>
    <div class="modal-actions">
      <button class="btn-save" onclick="saveEvent()">저장</button>
      <button class="btn-delete" id="modalDeleteBtn" onclick="deleteEvent()" style="display:none">삭제</button>
      <button class="btn-cancel" onclick="closeModal()">취소</button>
    </div>
  </div>
</div>

<footer>
  <span>© 2025 Battery System Laboratory — Firestore 실시간 동기화</span>
  <a href="admin.html" id="footerBack"><i class="fa fa-th-large"></i> 대시보드로</a>
</footer>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc,
         onSnapshot, addDoc, updateDoc,
         deleteDoc, serverTimestamp }             from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Firebase 초기화
const firebaseConfig = {
  apiKey:            "AIzaSyCyTqv6CIDSLqt4bFGXXQF12UtxmCI-teE",
  authDomain:        "bsladmin.firebaseapp.com",
  projectId:         "bsladmin",
  storageBucket:     "bsladmin.firebasestorage.app",
  messagingSenderId: "790486750368",
  appId:             "1:790486750368:web:b442d205314b67bd0165c5"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── 접속자
const urlParams  = new URLSearchParams(location.search);
const currentUser = urlParams.get('user') || sessionStorage.getItem('bsl_admin_user') || '(미확인)';

(function initUser() {
  if (currentUser && currentUser !== '(미확인)') {
    document.getElementById('userBadge').style.display = 'flex';
    document.getElementById('userBadgeName').textContent = currentUser;
  }
  document.getElementById('modalAuthorName').textContent = currentUser;
  const adminHref = 'admin.html?user=' + encodeURIComponent(currentUser);
  document.getElementById('backBtn').href   = adminHref;
  document.getElementById('footerBack').href = adminHref;
})();

// ── 상수
const TYPE_INFO = {
  meeting:  {label:'미팅',  color:'#3b82f6', cls:'type-meeting'},
  deadline: {label:'마감',  color:'#f45c5c', cls:'type-deadline'},
  present:  {label:'발표',  color:'#a78bfa', cls:'type-present'},
  lab:      {label:'실험',  color:'#3ecf8e', cls:'type-lab'},
  other:    {label:'기타',  color:'#f4a832', cls:'type-other'},
};

// ── 상태
let currentYear, currentMonth, events = [], editingId = null;

// ── 토스트
function showToast(msg, type='ok') {
  const t = document.getElementById('toast');
  const icon = t.querySelector('i');
  icon.className = type==='ok' ? 'fa fa-circle-check' : type==='err' ? 'fa fa-circle-xmark' : 'fa fa-spinner fa-spin';
  t.className = `toast ${type}`;
  document.getElementById('toastMsg').textContent = msg;
  t.classList.add('show');
  if (type !== 'loading') setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Firestore 실시간 구독 (onSnapshot → 모든 접속자 즉시 반영)
const overlay = document.getElementById('loadingOverlay');
overlay.classList.add('show');

onSnapshot(collection(db, 'events'), snapshot => {
  events = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
  overlay.classList.remove('show');
  render();
}, err => {
  overlay.classList.remove('show');
  showToast('Firestore 연결 오류: ' + err.message, 'err');
});

// ── 캘린더 초기화
(function init() {
  const now = new Date();
  currentYear  = now.getFullYear();
  currentMonth = now.getMonth();
})();

function changeMonth(d) {
  currentMonth += d;
  if (currentMonth > 11){currentMonth = 0; currentYear++;}
  else if (currentMonth < 0){currentMonth = 11; currentYear--;}
  render();
}
function goToday() {
  const n = new Date(); currentYear = n.getFullYear(); currentMonth = n.getMonth(); render();
}

function render() {
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('calMonth').textContent = currentYear+'년 '+MONTHS[currentMonth];
  renderGrid(); renderUpcoming(); renderStats();
}

function renderGrid() {
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const first    = new Date(currentYear, currentMonth, 1).getDay();
  const days     = new Date(currentYear, currentMonth+1, 0).getDate();
  const todayStr = fmt(new Date());
  for (let i = 0; i < first; i++)
    grid.appendChild(makeCell(new Date(currentYear, currentMonth, -first+i+1), true));
  for (let d = 1; d <= days; d++) {
    const date = new Date(currentYear, currentMonth, d);
    const cell = makeCell(date, false);
    if (fmt(date) === todayStr) cell.classList.add('today');
    grid.appendChild(cell);
  }
  const total = first + days;
  const rem   = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= rem; i++)
    grid.appendChild(makeCell(new Date(currentYear, currentMonth+1, i), true));
}

function makeCell(date, otherMonth) {
  const cell = document.createElement('div');
  cell.className = 'cal-cell' + (otherMonth ? ' other-month' : '');
  const dow = date.getDay();
  if (dow === 0) cell.classList.add('sunday');
  if (dow === 6) cell.classList.add('saturday');
  const dateStr = fmt(date);
  cell.onclick = () => openAddModal(dateStr);
  const dn = document.createElement('div');
  dn.className = 'day-num'; dn.textContent = date.getDate();
  cell.appendChild(dn);
  const dayEvts = events
    .filter(e => e.date === dateStr)
    .sort((a,b) => (a.time||'').localeCompare(b.time||''));
  dayEvts.slice(0,3).forEach(ev => {
    const info = TYPE_INFO[ev.type] || TYPE_INFO.other;
    const dot  = document.createElement('div');
    dot.className = 'event-dot ' + info.cls;
    dot.textContent = (ev.time ? ev.time.slice(0,5)+' ' : '') + ev.title;
    dot.onclick = e => { e.stopPropagation(); openEditModal(ev.id); };
    cell.appendChild(dot);
  });
  if (dayEvts.length > 3) {
    const more = document.createElement('div');
    more.className = 'more-events';
    more.textContent = `+${dayEvts.length-3}개`;
    cell.appendChild(more);
  }
  return cell;
}

function renderUpcoming() {
  const list = document.getElementById('upcomingList');
  const now  = new Date(); now.setHours(0,0,0,0);
  const upcoming = events
    .filter(e => new Date(e.date) >= now)
    .sort((a,b) => a.date.localeCompare(b.date) || (a.time||'').localeCompare(b.time||''))
    .slice(0, 8);
  if (!upcoming.length) {
    list.innerHTML = '<div class="no-events">다가오는 일정이 없습니다</div>'; return;
  }
  list.innerHTML = upcoming.map(ev => {
    const info = TYPE_INFO[ev.type] || TYPE_INFO.other;
    const d    = new Date(ev.date);
    const diff = Math.round((d - now) / (1000*60*60*24));
    const diffStr = diff===0?'오늘':diff===1?'내일':`${diff}일 후`;
    return `<div class="upcoming-item" onclick="window._openEdit('${ev.id}')">
      <div class="upcoming-stripe" style="background:${info.color}"></div>
      <div class="upcoming-content">
        <div class="upcoming-title">${esc(ev.title)}</div>
        <div class="upcoming-meta">${ev.date}${ev.time?' '+ev.time:''} · ${diffStr}</div>
        <span class="upcoming-type ${info.cls}">${info.label}</span>
        ${ev.author?`<div class="upcoming-author"><i class="fa fa-user" style="font-size:9px"></i> ${esc(ev.author)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}
window._openEdit = id => openEditModal(id);

function renderStats() {
  const monthEvts = events.filter(e => {
    const d = new Date(e.date);
    return d.getFullYear()===currentYear && d.getMonth()===currentMonth;
  });
  const stats  = document.getElementById('monthStats');
  const counts = {};
  monthEvts.forEach(e => counts[e.type] = (counts[e.type]||0)+1);
  if (!monthEvts.length) {
    stats.innerHTML = '<div style="color:var(--text3);text-align:center;padding:8px 0">이달 일정 없음</div>'; return;
  }
  stats.innerHTML = `<div style="color:var(--text);font-weight:600;margin-bottom:4px">총 ${monthEvts.length}건</div>` +
    Object.entries(counts).map(([type,cnt]) => {
      const info = TYPE_INFO[type] || TYPE_INFO.other;
      return `<div style="display:flex;align-items:center;gap:8px">
        <div style="width:8px;height:8px;border-radius:2px;background:${info.color};flex-shrink:0"></div>
        <span>${info.label}</span>
        <span style="margin-left:auto;font-family:var(--mono);color:var(--text)">${cnt}건</span>
      </div>`;
    }).join('');
}

// ── 모달
function openAddModal(dateStr) {
  editingId = null;
  document.getElementById('modalTitle').textContent = '일정 추가';
  document.getElementById('evTitle').value  = '';
  document.getElementById('evDate').value   = dateStr || fmt(new Date());
  document.getElementById('evTime').value   = '';
  document.getElementById('evType').value   = 'meeting';
  document.getElementById('evNote').value   = '';
  document.getElementById('modalDeleteBtn').style.display = 'none';
  document.getElementById('editAuthorRow').style.display  = 'none';
  document.getElementById('modalAuthorName').textContent  = currentUser;
  document.getElementById('eventModal').classList.add('open');
  setTimeout(() => document.getElementById('evTitle').focus(), 100);
}
window.openAddModal = openAddModal;

function openEditModal(id) {
  const ev = events.find(e => e.id === id); if (!ev) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '일정 수정';
  document.getElementById('evTitle').value = ev.title;
  document.getElementById('evDate').value  = ev.date;
  document.getElementById('evTime').value  = ev.time  || '';
  document.getElementById('evType').value  = ev.type;
  document.getElementById('evNote').value  = ev.note  || '';
  document.getElementById('modalDeleteBtn').style.display = '';
  document.getElementById('modalAuthorName').textContent  = currentUser + ' (수정)';
  if (ev.author) {
    document.getElementById('editAuthorRow').style.display = 'block';
    document.getElementById('editAuthorText').textContent  = ev.author + (ev.createdAt ? ' · '+ev.createdAt : '');
  } else {
    document.getElementById('editAuthorRow').style.display = 'none';
  }
  document.getElementById('eventModal').classList.add('open');
}
function openEditModal_global(id){ openEditModal(id); }

function closeModal() { document.getElementById('eventModal').classList.remove('open'); }
window.closeModal = closeModal;
document.getElementById('eventModal').addEventListener('click', e => {
  if (e.target === document.getElementById('eventModal')) closeModal();
});

async function saveEvent() {
  const title = document.getElementById('evTitle').value.trim();
  const date  = document.getElementById('evDate').value;
  if (!title || !date) { alert('제목과 날짜를 입력해 주세요.'); return; }
  const existing = editingId ? events.find(e => e.id === editingId) : null;
  const data = {
    title, date,
    time:      document.getElementById('evTime').value || '',
    type:      document.getElementById('evType').value,
    note:      document.getElementById('evNote').value.trim(),
    author:    existing?.author || currentUser,
    createdAt: existing?.createdAt || new Date().toLocaleDateString('ko-KR'),
    updatedBy: currentUser,
    updatedAt: serverTimestamp(),
  };
  showToast('저장 중...', 'loading');
  try {
    if (editingId) {
      await updateDoc(doc(db, 'events', editingId), data);
    } else {
      await addDoc(collection(db, 'events'), data);
    }
    showToast('저장 완료!', 'ok');
    closeModal();
  } catch(e) {
    showToast('저장 실패: ' + e.message, 'err');
  }
}
window.saveEvent = saveEvent;

async function deleteEvent() {
  if (!editingId || !confirm('이 일정을 삭제할까요?')) return;
  showToast('삭제 중...', 'loading');
  try {
    await deleteDoc(doc(db, 'events', editingId));
    showToast('삭제 완료', 'ok');
    closeModal();
  } catch(e) {
    showToast('삭제 실패: ' + e.message, 'err');
  }
}
window.deleteEvent = deleteEvent;

function fmt(d) {
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function changeMonth_global(d){ changeMonth(d); }
function goToday_global(){ goToday(); }
window.changeMonth = changeMonth;
window.goToday = goToday;
</script>
